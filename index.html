<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do MVC List</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script type="module" src="./js/app.js"></script>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>To-Do MVC List</h1>

            <form class="todo-form" id="todo-form">
                <input type="text" id="todo-input" placeholder="To-do item" autocomplete="off">
                <button type="submit">Add</button>
            </form>
        </header>

        <main class="todo-sections">
            <section class="todo-column"> 
                <h2>Pending Tasks</h2>
                <ul id="pending-list" class="todo-list"></ul> 
            </section>
            <section class="todo-column">
                <h2>Completed Tasks</h2>
                <ul id="completed-list" class="todo-list"></ul>
            </section>
        </main>        
    </div>    
</body>
</html>
